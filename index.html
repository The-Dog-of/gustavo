<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOCA COMMUNITY | ELITE AURA</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --aura-joca: #7b2fff;
    --aura-gustavo: #ff2a4b;
    --aura-glow: #b44fff;
    --gold: #ffcf40;
    --silver: #d1d7e0;
    --bronze: #e07f4f;
    --bg-dark: #030305;
    --panel-bg: rgba(12, 12, 18, 0.65);
    --panel-border: rgba(123, 47, 255, 0.15);
    --text-main: #eef0f2;
    --text-muted: #6b6e80;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body, html {
    background-color: var(--bg-dark); color: var(--text-main);
    font-family: 'Rajdhani', sans-serif;
    height: 100vh; overflow: hidden; 
  }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(123,47,255,0.3); border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--aura-joca); }

  #vfx-canvas {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none; z-index: 999;
  }

  .bg-glow {
    position: fixed; border-radius: 50%; filter: blur(120px); opacity: 0.15; z-index: -1;
  }
  .glow-1 { top: -10%; left: -10%; width: 50vw; height: 50vw; background: var(--aura-joca); }
  .glow-2 { bottom: -10%; right: -10%; width: 40vw; height: 40vw; background: var(--aura-gustavo); }

  #app {
    display: flex; height: 100vh; width: 100vw; padding: 20px; gap: 20px;
  }

  .chat-section {
    flex: 1; max-width: 500px;
    background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border: 1px solid var(--panel-border); border-radius: 20px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
  }

  .chat-header {
    padding: 20px; border-bottom: 1px solid var(--panel-border);
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(0,0,0,0.2);
  }
  .chat-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; letter-spacing: 2px; text-shadow: 0 0 10px var(--aura-joca); }
  .chat-title span { color: var(--aura-glow); }
  
  .chat-history {
    flex: 1; overflow-y: auto; padding: 20px;
    display: flex; flex-direction: column; gap: 1.5rem;
    scroll-behavior: smooth;
  }

  .chat-msg {
    display: flex; flex-direction: column; opacity: 0;
    transform: translateY(20px); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .chat-msg.visible { opacity: 1; transform: translateY(0); }
  .chat-msg.joca { align-items: flex-start; }
  .chat-msg.thegustavo { align-items: flex-end; }

  .msg-header { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .chat-msg.thegustavo .msg-header { flex-direction: row-reverse; }


  .avatar-container {
    width: 40px; height: 40px; border-radius: 12px;
    background: #111; border: 2px solid transparent;
    position: relative; overflow: hidden; flex-shrink: 0;
  }
  .chat-msg.joca .avatar-container { border-color: var(--aura-joca); box-shadow: 0 0 15px rgba(123,47,255,0.4); }
  .chat-msg.thegustavo .avatar-container { border-color: var(--aura-gustavo); box-shadow: 0 0 15px rgba(255,42,75,0.4); }
  
  .avatar-img { width: 100%; height: 100%; object-fit: cover; position: relative; z-index: 2; }
  .avatar-fallback {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Bebas Neue', sans-serif; font-size: 1.2rem; color: #fff; z-index: 1;
    background: linear-gradient(135deg, #222, #000);
  }

  .msg-name { font-size: 1rem; font-weight: 700; color: #fff; }
  .msg-bubble {
    padding: 12px 18px; font-size: 1.1rem; line-height: 1.4; font-weight: 500;
    max-width: 90%; position: relative; backdrop-filter: blur(10px);
  }
  .chat-msg.joca .msg-bubble {
    background: rgba(123,47,255,0.1); border: 1px solid var(--panel-border);
    border-left: 3px solid var(--aura-joca); border-radius: 4px 16px 16px 16px;
  }
  .chat-msg.thegustavo .msg-bubble {
    background: rgba(255,42,75,0.1); border: 1px solid rgba(255,42,75,0.2);
    border-right: 3px solid var(--aura-gustavo); border-radius: 16px 4px 16px 16px; text-align: right;
  }
  .mention { color: var(--aura-glow); font-weight: 700; text-shadow: 0 0 8px rgba(180,79,255,0.5); }


  .typing-indicator {
    display: none; align-items: center; gap: 5px; padding: 12px 18px;
    background: rgba(123,47,255,0.1); border-left: 3px solid var(--aura-joca);
    border-radius: 4px 16px 16px 16px; width: fit-content;
  }
  .typing-indicator.active { display: flex; }
  .dot { width: 6px; height: 6px; background: var(--aura-glow); border-radius: 50%; animation: blink 1.4s infinite both; }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.2); box-shadow: 0 0 10px var(--aura-glow); } }


  .chat-controls {
    padding: 20px; border-top: 1px solid var(--panel-border); background: rgba(0,0,0,0.4);
    display: flex; gap: 10px; justify-content: center;
  }
  .btn {
    flex: 1; padding: 12px 0; background: rgba(255,255,255,0.03);
    border: 1px solid var(--panel-border); border-radius: 8px;
    color: #fff; font-family: 'Space Mono', monospace; font-size: 0.85rem; letter-spacing: 1px;
    cursor: pointer; text-transform: uppercase; transition: 0.3s;
    position: relative; overflow: hidden;
  }
  .btn:hover:not(:disabled) {
    background: rgba(123,47,255,0.2); border-color: var(--aura-glow); box-shadow: 0 0 15px rgba(123,47,255,0.3); transform: translateY(-2px);
  }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .btn.auto-active { background: var(--aura-joca); color: #fff; font-weight: bold; border-color: var(--aura-glow); box-shadow: 0 0 20px rgba(123,47,255,0.5); }


  .cards-section {
    flex: 2; position: relative;
    background: var(--panel-bg); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border: 1px solid var(--panel-border); border-radius: 20px;
    padding: 30px; overflow-y: auto; scroll-behavior: smooth;
    display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px; align-content: flex-start;
  }

  .card {
    background: rgba(20,20,30,0.8); border: 1px solid rgba(255,255,255,0.05);
    border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 15px;
    opacity: 0; transform: scale(0.8) translateY(30px);
    transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); /* Spring effect */
    position: relative; overflow: hidden;
  }
  .card.visible { opacity: 1; transform: scale(1) translateY(0); }
  .card::before {
    content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent); pointer-events: none;
  }

  .card-rank {
    font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; line-height: 1; color: rgba(255,255,255,0.1);
    position: absolute; right: 20px; top: 10px; z-index: 0;
  }

  .card-avatar-wrapper {
    width: 70px; height: 70px; border-radius: 16px; flex-shrink: 0;
    border: 2px solid var(--panel-border); background: #000;
    position: relative; overflow: hidden; z-index: 2;
  }
  .card-info { flex: 1; z-index: 2; }
  .card-name { font-size: 1.4rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
  .card-desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.3; margin-top: 4px; }
  .card-aura {
    display: inline-block; font-family: 'Space Mono', monospace; font-size: 0.7rem; font-weight: bold;
    background: var(--aura-glow); color: #000; padding: 3px 8px; border-radius: 4px; margin-top: 8px;
  }


  .rank-1 { border-color: rgba(255,207,64,0.3); box-shadow: inset 0 0 20px rgba(255,207,64,0.1), 0 10px 20px rgba(0,0,0,0.5); }
  .rank-1 .card-avatar-wrapper { border-color: var(--gold); box-shadow: 0 0 20px rgba(255,207,64,0.5); }
  .rank-1 .card-rank { color: rgba(255,207,64,0.3); }
  .rank-1 .card-aura { background: var(--gold); }

  .rank-2 { border-color: rgba(209,215,224,0.3); }
  .rank-2 .card-avatar-wrapper { border-color: var(--silver); box-shadow: 0 0 15px rgba(209,215,224,0.4); }
  .rank-2 .card-rank { color: rgba(209,215,224,0.2); }

  .rank-3 { border-color: rgba(224,127,79,0.3); }
  .rank-3 .card-avatar-wrapper { border-color: var(--bronze); box-shadow: 0 0 15px rgba(224,127,79,0.4); }
  .rank-3 .card-rank { color: rgba(224,127,79,0.2); }

  @media (max-width: 900px) {
    #app { flex-direction: column; overflow: auto; padding: 10px; }
    body { overflow: auto; }
    .chat-section { max-width: 100%; height: 50vh; flex: none; }
    .cards-section { flex: none; min-height: 50vh; overflow: visible; }
  }
</style>
</head>
<body>

<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<canvas id="vfx-canvas"></canvas>

<div id="app">
  <div class="chat-section">
    <div class="chat-header">
      <div class="chat-title">GUSTAVO <span>SAFADA.</span></div>
      <div style="font-family:'Space Mono'; font-size:0.7rem; color:var(--text-muted)">LOG: RANKING</div>
    </div>
    
    <div class="chat-history" id="chat-history">
      <div class="chat-msg joca" id="typing-box" style="display: none; opacity: 1; transform: none;">
        <div class="typing-indicator active">
          <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
      </div>
    </div>

    <div class="chat-controls">
      <button class="btn" id="btn-prev" onclick="stepBack()" disabled>← Voltar</button>
      <button class="btn" id="btn-next" onclick="stepForward()">Avançar →</button>
      <button class="btn" id="btn-auto" onclick="toggleAuto()">[ Auto ]</button>
    </div>
  </div>

  <div class="cards-section" id="cards-list">
    </div>
</div>

<script>
const MESSAGES = [
  { id: 0, user: 'thegustavo', name: 'gustavo', time: '17:11', img: 'assets/gustavo.png', text: '<span class="mention">@Joca</span> transar de ladinho e mto resenha' },
  { id: 1, user: 'joca',   name: 'Joca',    time: '17:14', img: 'assets/gustavo.png',   text: 'a piroca entrando e saindo' },
  { id: 2, user: 'thegustavo', name: 'gustavo', time: '17:16', img: 'assets/gustavo.png', text: '67' },
  { id: 3, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'ai tu da uma segurada no peitinho' },
  { id: 4, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'e dale tung tung no sahur dela' },
  { id: 5, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'bota a mao no pescocinho',  },
  { id: 6, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'e TOME', },
  { id: 7, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'chocolex.', },
  { id: 8, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'o foda eh so quando o ', },
  { id: 9, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'dick',  },
  { id:10, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'escapa da pussy', },
  { id:11, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'ai vira', },
  { id:12, user: 'joca',   name: 'Joca',    time: '17:18', img: 'assets/gustavo.png',   text: 'Saboooooor sexo',  },
];

const MEMBERS = [
  { rank: 1,  name: 'Gustavo',    initials: 'JC', img: 'assets/gustavo.png'  },
  { rank: 2,  name: 'Gustavo', initials: 'TD', img: 'assets/gustavo.png'},
  { rank: 3,  name: 'Gustavo',    initials: 'SM', img: 'assets/gustavo.png'},
  { rank: 4,  name: 'Gustavo', initials: 'BL', img: 'assets/gustavo.png'},
  { rank: 5,  name: 'Gustavo',     initials: 'XN', img: 'assets/gustavo.png'},
  { rank: 6,  name: 'Gustavo',    initials: 'LN', img: 'assets/gustavo.png' },
  { rank: 7,  name: 'Gustavo', initials: 'MT', img: 'assets/gustavo.png' },
  { rank: 8,  name: 'Gustavo',  initials: 'LZ', img: 'assets/gustavo.png' },
  { rank: 9,  name: 'Gustavo',    initials: 'JT', img: 'assets/gustavo.png' },
  { rank: 10, name: 'Gustavo', initials: 'TL', img: 'assets/gustavo.png' },
];


const canvas = document.getElementById('vfx-canvas');
const ctx = canvas.getContext('2d');
let particles = [];

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resize);
resize();

class SmokeParticle {
  constructor(x, y, colorStr) {
    this.x = x; this.y = y;
    this.vx = (Math.random() - 0.5) * 8; 
    this.vy = (Math.random() - 0.5) * 8;
    this.size = Math.random() * 20 + 10;
    this.maxSize = this.size + Math.random() * 60 + 40;
    this.life = 1; 
    this.decay = Math.random() * 0.02 + 0.015;
    this.colorStr = colorStr; 
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.size += 2; 
    this.life -= this.decay;
  }
  draw() {
    ctx.globalCompositeOperation = 'screen';
    const radGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size);
    radGrad.addColorStop(0, `rgba(${this.colorStr}, ${this.life})`);
    radGrad.addColorStop(1, `rgba(${this.colorStr}, 0)`);
    ctx.fillStyle = radGrad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function animateVFX() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    particles[i].draw();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
  requestAnimationFrame(animateVFX);
}
animateVFX();

function triggerSmokeExplosion(x, y, colorStr = '180, 79, 255') {
  for (let i = 0; i < 40; i++) {
    particles.push(new SmokeParticle(x, y, colorStr));
  }
}

let step = -1;
let autoPlaying = false;
let autoTimer = null;
const historyEl = document.getElementById('chat-history');
const typingBox = document.getElementById('typing-box');

function createAvatarHTML(imgSrc, initials) {
  return `
    <div class="avatar-container">
      <img src="${imgSrc}" class="avatar-img" onerror="this.style.display='none'">
      <div class="avatar-fallback">${initials}</div>
    </div>
  `;
}

function scrollToBottom() {
  historyEl.scrollTop = historyEl.scrollHeight;
}

function renderMessage(msg) {

  typingBox.style.display = 'none';

  const div = document.createElement('div');
  div.className = `chat-msg ${msg.user}`;
  div.id = `msg-${msg.id}`;
  
  const initials = msg.user === 'joca' ? 'JC' : (msg.user === 'thegustavo' ? 'TD' : '??');
  const avatarHTML = createAvatarHTML(msg.img, initials);

  div.innerHTML = `
    <div class="msg-header">
      ${avatarHTML}
      <div class="msg-name">${msg.name} <span style="font-size: 0.7rem; color: var(--text-muted)">${msg.time}</span></div>
    </div>
    <div class="msg-bubble">${msg.text}</div>
  `;
  
  // Insere ANTES da caixa de "typing"
  historyEl.insertBefore(div, typingBox);
  
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      div.classList.add('visible');
      scrollToBottom();
    });
  });
}

function renderCardComFumaca(idx) {
  const m = MEMBERS[idx];
  const list = document.getElementById('cards-list');
  
  const div = document.createElement('div');
  let rankClass = m.rank === 1 ? 'rank-1' : m.rank === 2 ? 'rank-2' : m.rank === 3 ? 'rank-3' : '';
  div.className = `card ${rankClass}`;
  div.id = `card-${idx}`;

  div.innerHTML = `
    <div class="card-rank">#${m.rank}</div>
    <div class="card-avatar-wrapper">
      <img src="${m.img}" style="width:100%;height:100%;object-fit:cover;position:relative;z-index:2" onerror="this.style.display='none'">
      <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#111;color:#fff;font-family:'Bebas Neue';font-size:2rem;z-index:1">${m.initials}</div>
    </div>
    <div class="card-info">
      <div class="card-name">${m.name}</div>
      <div class="card-desc">${m.desc}</div>
      <div class="card-aura">${m.aura}</div>
    </div>
  `;
  
  list.appendChild(div);


  setTimeout(() => {
    const rect = div.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    

    const color = m.rank === 1 ? '255, 207, 64' : (m.rank === 2 ? '255, 42, 75' : '180, 79, 255');
    triggerSmokeExplosion(centerX, centerY, color);

    setTimeout(() => {
      div.classList.add('visible');

      div.scrollIntoView({ behavior: 'smooth', block: 'end' });
    }, 200); 
  }, 50);
}


function updateButtons() {
  document.getElementById('btn-prev').disabled = step < 0;
  document.getElementById('btn-next').disabled = step >= MESSAGES.length - 1;
}

function showTypingAndProceed(msg) {
  if(msg.user === 'joca') {
    typingBox.style.display = 'flex';
    scrollToBottom();
    setTimeout(() => {
      renderMessage(msg);
      checkCardReveal(msg);
    }, 800); 
  } else {
    renderMessage(msg);
    checkCardReveal(msg);
  }
}

function checkCardReveal(msg) {
  if (msg.revealsCard !== undefined) {
    setTimeout(() => renderCardComFumaca(msg.revealsCard), 400);
  }
}

function stepForward() {
  if (step >= MESSAGES.length - 1) return;
  step++;
  updateButtons();
  
  const msg = MESSAGES[step];
  showTypingAndProceed(msg);
}

function stepBack() {
  if (step < 0) return;
  const msg = MESSAGES[step];

  const msgEl = document.getElementById(`msg-${msg.id}`);
  if (msgEl) {
    msgEl.classList.remove('visible');
    setTimeout(() => msgEl.remove(), 400);
  }

  if (msg.revealsCard !== undefined) {
    const cardEl = document.getElementById(`card-${msg.revealsCard}`);
    if (cardEl) {
      cardEl.classList.remove('visible');
      setTimeout(() => cardEl.remove(), 400);
    }
  }
  
  step--;
  updateButtons();
  typingBox.style.display = 'none'; 
}

function toggleAuto() {
  autoPlaying = !autoPlaying;
  const btn = document.getElementById('btn-auto');
  if (autoPlaying) {
    btn.textContent = '[ PARAR ]';
    btn.classList.add('auto-active');
    runAuto();
  } else {
    btn.textContent = '[ AUTO ]';
    btn.classList.remove('auto-active');
    clearTimeout(autoTimer);
  }
}

function runAuto() {
  if (!autoPlaying) return;
  if (step >= MESSAGES.length - 1) {
    toggleAuto();
    return;
  }
  

  const proxMsg = MESSAGES[step + 1];
  const delay = proxMsg.user === 'joca' ? 2200 : 1500; 
  
  stepForward();
  autoTimer = setTimeout(runAuto, delay);
}
</script>
</body>
</html>
